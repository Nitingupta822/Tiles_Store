<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>SSNV Store | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, #1a1d21 0%, #2d3238 100%);
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .login-header .logo {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 2rem;
      color: #fff;
    }

    .login-header h1 {
      color: #fff;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .login-header p {
      color: rgba(255, 255, 255, 0.6);
      margin: 0;
      font-size: 0.9rem;
    }

    .login-body {
      padding: 2rem;
    }

    .form-floating {
      margin-bottom: 1rem;
    }

    .form-floating .form-control {
      border-radius: 10px;
      border: 2px solid #e5e9f0;
      padding: 1rem 1rem;
      height: auto;
    }

    .form-floating .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
    }

    .form-floating label {
      padding: 1rem;
    }

    .btn-login {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      color: #fff;
    }

    .login-footer {
      padding: 1.5rem 2rem;
      background: #f8f9fa;
      text-align: center;
      border-top: 1px solid #e5e9f0;
    }

    .login-footer p {
      margin: 0;
      color: #6c757d;
      font-size: 0.85rem;
    }

    .alert {
      border-radius: 10px;
      border: none;
      margin-bottom: 1.5rem;
    }

    .alert-danger {
      background: #fff5f5;
      color: #c53030;
    }

    .alert-success {
      background: #f0fff4;
      color: #276749;
    }

    /* Floating shapes background */
    .bg-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    .bg-shapes span {
      position: absolute;
      display: block;
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 15s infinite;
    }

    .bg-shapes span:nth-child(1) {
      left: 10%;
      top: 20%;
      animation-delay: 0s;
    }

    .bg-shapes span:nth-child(2) {
      left: 80%;
      top: 50%;
      animation-delay: 2s;
      width: 120px;
      height: 120px;
    }

    .bg-shapes span:nth-child(3) {
      left: 30%;
      top: 70%;
      animation-delay: 4s;
      width: 60px;
      height: 60px;
    }

    .bg-shapes span:nth-child(4) {
      left: 60%;
      top: 10%;
      animation-delay: 6s;
      width: 100px;
      height: 100px;
    }

    .bg-shapes span:nth-child(5) {
      left: 90%;
      top: 80%;
      animation-delay: 8s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-30px) rotate(180deg);
      }
    }

    /* ===== WELCOME SPLASH SCREEN ===== */
    #welcome-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.7s cubic-bezier(0.77, 0, 0.175, 1);
    }

    #welcome-splash.slide-up {
      transform: translateY(-100%);
    }

    .splash-logo {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      color: #fff;
      margin-bottom: 1.5rem;
      box-shadow: 0 20px 60px rgba(102, 126, 234, 0.5);
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
    }

    .splash-title {
      font-size: 3rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s both;
      background: linear-gradient(90deg, #fff 0%, #c4b5fd 50%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s both,
        shimmer 2s linear 1s infinite;
    }

    .splash-subtitle {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-top: 0.5rem;
      animation: fadeUp 0.6s ease 0.8s both;
    }

    .splash-dots {
      display: flex;
      gap: 8px;
      margin-top: 2.5rem;
      animation: fadeUp 0.6s ease 1s both;
    }

    .splash-dots span {
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    .splash-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .splash-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.7);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: 200% center;
      }

      100% {
        background-position: -200% center;
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.3);
      }
    }
  </style>
</head>

<body>

  <!-- ===== WELCOME SPLASH SCREEN ===== -->
  <div id="welcome-splash">
    <div class="splash-logo">
      <i class="bi bi-grid-3x3-gap-fill"></i>
    </div>
    <div class="splash-title">SSNV Store</div>
    <div class="splash-subtitle">Tiles Stock Management</div>
    <div class="splash-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
  <!-- ========================= -->

  <div class="bg-shapes">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo">
          <i class="bi bi-grid-3x3-gap-fill"></i>
        </div>
        <h1>TileStock</h1>
        <p>Stock Management System</p>
      </div>

      <div class="login-body">
        {% with messages = get_flashed_messages() %} {% if messages %} {% for
        message in messages %}
        <div
          class="alert {{ 'alert-success' if 'Welcome' in message or 'success' in message.lower() or 'logged out' in message.lower() else 'alert-danger' }}">
          <i
            class="bi {{ 'bi-check-circle' if 'Welcome' in message or 'success' in message.lower() or 'logged out' in message.lower() else 'bi-exclamation-circle' }} me-2"></i>
          {{ message }}
        </div>
        {% endfor %} {% endif %} {% endwith %}

        <form method="POST">
          <div class="form-floating">
            <input type="text" class="form-control" id="username" name="username" placeholder="Username" required
              autofocus />
            <label for="username"><i class="bi bi-person me-2"></i>Username</label>
          </div>

          <div class="form-floating">
            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required />
            <label for="password"><i class="bi bi-lock me-2"></i>Password</label>
          </div>

          <button type="submit" class="btn btn-login mt-3">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </form>
      </div>

      <div class="login-footer">
        <p>
          <i class="bi bi-shield-lock me-1"></i>Secure Login • Contact admin
          for access
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Hide splash screen after 2.5 seconds with a slide-up animation
    window.addEventListener('load', function () {
      setTimeout(function () {
        var splash = document.getElementById('welcome-splash');
        splash.classList.add('slide-up');
        // Remove from DOM after animation completes
        splash.addEventListener('transitionend', function () {
          splash.remove();
        });
      }, 2500);
    });
  </script>
</body>

</html>
